<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel - StyleNest</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --secondary: #eff6ff;
      --text: #1e293b;
      --light-text: #64748b;
      --white: #fff;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #ca8a04;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--secondary);
      color: var(--text);
      line-height: 1.6;
    }
    
    /* Login Screen */
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: var(--white);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    
    .login-container h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--primary);
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .btn {
      background: var(--primary);
      color: var(--white);
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1rem;
    }
    
    .btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }
    
    .btn-success {
      background: var(--success);
    }
    
    .btn-success:hover {
      background: #15803d;
    }
    
    .btn-danger {
      background: var(--danger);
    }
    
    .btn-danger:hover {
      background: #b91c1c;
    }
    
    .btn-warning {
      background: var(--warning);
    }
    
    .btn-warning:hover {
      background: #a16207;
    }
    
    .btn-secondary {
      background: var(--light-text);
    }
    
    .btn-secondary:hover {
      background: #475569;
    }
    
    .btn-full {
      width: 100%;
    }
    
    /* Admin Dashboard */
    .admin-container {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .admin-header {
      background: var(--white);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .admin-header h1 {
      color: var(--primary);
    }
    
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
    }
    
    .product-form {
      background: var(--white);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      height: fit-content;
    }
    
    .product-form h2 {
      margin-bottom: 1.5rem;
      color: var(--primary);
    }
    
    .product-list {
      background: var(--white);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    
    .product-list h2 {
      margin-bottom: 1.5rem;
      color: var(--primary);
    }
    
    .product-item {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 1rem;
      align-items: center;
    }
    
    .product-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      background: #f0f0f0;
    }
    
    .product-item-info h3 {
      margin-bottom: 0.5rem;
    }
    
    .product-item-info p {
      color: var(--light-text);
      font-size: 0.9rem;
    }
    
    .product-item-actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .product-item-actions button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
    }
    
    .error-message {
      background: #fee2e2;
      color: var(--danger);
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }
    
    .success-message {
      background: #d1fae5;
      color: var(--success);
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--light-text);
    }
    
    @media (max-width: 768px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
      
      .product-item {
        grid-template-columns: 1fr;
      }
      
      .product-item-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-container" id="loginScreen">
    <h1>🔐 Admin Login</h1>
    <div class="error-message" id="loginError">Invalid username or password!</div>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="Enter password">
      </div>
      <button type="submit" class="btn btn-full">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1rem; color: var(--light-text);">
      <a href="index.html">← Back to Website</a>
    </p>
  </div>

  <!-- Admin Dashboard -->
  <div class="admin-container" id="adminDashboard">
    <div class="admin-header">
      <h1>📦 Product Management</h1>
      <div>
        <button class="btn btn-secondary" onclick="exportData()">📥 Export Data</button>
        <button class="btn" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
    
    <div class="admin-grid">
      <!-- Product Form -->
      <div class="product-form">
        <h2 id="formTitle">➕ Add New Product</h2>
        <div class="success-message" id="formSuccess">Product saved successfully!</div>
        <form id="productForm">
          <input type="hidden" id="productId">
          
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="prodName" required placeholder="e.g., Nazneen 3PC">
          </div>
          
          <div class="form-group">
            <label>Price (PKR) *</label>
            <input type="number" id="prodPrice" required placeholder="e.g., 7490">
          </div>
          
          <div class="form-group">
            <label>Original Price (PKR)</label>
            <input type="number" id="prodOriginalPrice" placeholder="e.g., 12000">
          </div>
          
          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="prodImage" placeholder="https://example.com/image.jpg">
            <small style="color: var(--light-text); font-size: 0.8rem;">
              Leave empty for placeholder
            </small>
          </div>
          
          <div class="form-group">
            <label>Badge</label>
            <select id="prodBadge">
              <option value="">None</option>
              <option value="New">New</option>
              <option value="Sale">Sale</option>
              <option value="Hot">Hot</option>
              <option value="Best Seller">Best Seller</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Rating (1-5)</label>
            <input type="number" id="prodRating" min="1" max="5" step="0.1" value="5">
          </div>
          
          <div class="form-group">
            <label>Reviews Count</label>
            <input type="number" id="prodReviews" min="0" value="0">
          </div>
          
          <button type="submit" class="btn btn-success btn-full" id="submitBtn">Add Product</button>
          <button type="button" class="btn btn-secondary btn-full" id="cancelBtn" style="display:none; margin-top: 0.5rem;" onclick="resetForm()">Cancel Edit</button>
        </form>
      </div>
      
      <!-- Product List -->
      <div class="product-list">
        <h2>📋 All Products (<span id="productCount">0</span>)</h2>
        <div id="productsListContainer">
          <div class="empty-state">No products added yet.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Data File -->
  <script src="data.js"></script>
  
  <script>
    let isLoggedIn = false;
    let editingId = null;
    
    // Login Form
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
        isLoggedIn = true;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminDashboard').style.display = 'block';
        loadProducts();
        displayProducts();
      } else {
        document.getElementById('loginError').style.display = 'block';
        setTimeout(() => {
          document.getElementById('loginError').style.display = 'none';
        }, 3000);
      }
    });
    
    // Logout
    function logout() {
      isLoggedIn = false;
      document.getElementById('adminDashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }
    
    // Product Form Submit
    document.getElementById('productForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const product = {
        id: editingId || Date.now().toString(),
        name: document.getElementById('prodName').value,
        price: parseFloat(document.getElementById('prodPrice').value),
        originalPrice: parseFloat(document.getElementById('prodOriginalPrice').value) || null,
        image: document.getElementById('prodImage').value,
        badge: document.getElementById('prodBadge').value,
        rating: parseFloat(document.getElementById('prodRating').value),
        reviews: parseInt(document.getElementById('prodReviews').value)
      };
      
      if (editingId) {
        // Edit existing product
        const index = products.findIndex(p => p.id === editingId);
        if (index !== -1) {
          products[index] = product;
        }
      } else {
        // Add new product
        products.push(product);
      }
      
      saveProducts();
      displayProducts();
      resetForm();
      
      // Success message
      const successMsg = document.getElementById('formSuccess');
      successMsg.style.display = 'block';
      setTimeout(() => {
        successMsg.style.display = 'none';
      }, 3000);
    });
    
    // Display Products in Admin Panel
    function displayProducts() {
      const container = document.getElementById('productsListContainer');
      document.getElementById('productCount').textContent = products.length;
      
      if (products.length === 0) {
        container.innerHTML = '<div class="empty-state">No products added yet.</div>';
        return;
      }
      
      container.innerHTML = products.map(product => `
        <div class="product-item">
          ${product.image ? 
            `<img src="${product.image}" alt="${product.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22%3E%3Crect width=%2280%22 height=%2280%22 fill=%22%23f0f0f0%22/%3E%3Ctext x=%2250%%22 y=%2250%%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23999%22%3E📷%3C/text%3E%3C/svg%3E'">` :
            `<div style="width:80px;height:80px;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2rem;">📷</div>`
          }
          <div class="product-item-info">
            <h3>${product.name}</h3>
            <p>Price: Rs.${product.price.toLocaleString()} PKR</p>
            ${product.originalPrice ? `<p>Original: Rs.${product.originalPrice.toLocaleString()} PKR</p>` : ''}
            ${product.badge ? `<p><strong>Badge:</strong> ${product.badge}</p>` : ''}
          </div>
          <div class="product-item-actions">
            <button class="btn btn-warning" onclick="editProduct('${product.id}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteProduct('${product.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }
    
    // Edit Product
    function editProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;
      
      editingId = id;
      document.getElementById('prodName').value = product.name;
      document.getElementById('prodPrice').value = product.price;
      document.getElementById('prodOriginalPrice').value = product.originalPrice || '';
      document.getElementById('prodImage').value = product.image || '';
      document.getElementById('prodBadge').value = product.badge || '';
      document.getElementById('prodRating').value = product.rating || 5;
      document.getElementById('prodReviews').value = product.reviews || 0;
      
      document.getElementById('formTitle').textContent = '✏️ Edit Product';
      document.getElementById('submitBtn').textContent = 'Update Product';
      document.getElementById('cancelBtn').style.display = 'block';
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // Delete Product
    function deleteProduct(id) {
      if (confirm('Are you sure you want to delete this product?')) {
        products = products.filter(p => p.id !== id);
        saveProducts();
        displayProducts();
        
        if (editingId === id) {
          resetForm();
        }
      }
    }
    
    // Reset Form
    function resetForm() {
      editingId = null;
      document.getElementById('productForm').reset();
      document.getElementById('formTitle').textContent = '➕ Add New Product';
      document.getElementById('submitBtn').textContent = 'Add Product';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('prodRating').value = 5;
      document.getElementById('prodReviews').value = 0;
    }
    
    // Export Data (Download as JSON)
    function exportData() {
      const dataStr = JSON.stringify(products, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'stylenest-products.json';
      a.click();
      URL.revokeObjectURL(url);
    }
    
    // Check if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      if (isLoggedIn) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminDashboard').style.display = 'block';
        displayProducts();
      }
    });
  </script>
</body>
</html>
